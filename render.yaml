databases:
  - name: recruitment-db
    databaseName: recruitment
    plan: free

services:
  - type: web
    name: recruitment-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: recruitment-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: recruitment-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: recruitment-db
          property: password
      - key: FRONTEND_URL
        sync: false
