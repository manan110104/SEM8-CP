# Local development (H2 in-memory)
server.port=${PORT:8080}
spring.application.name=recruitment-system

spring.datasource.url=jdbc:h2:mem:recruitmentdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# CORS (comma-separated origins)
app.cors.allowed-origins=http://localhost:8080,http://localhost:5500,http://127.0.0.1:5500