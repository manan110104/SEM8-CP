<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruitment System</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="container">
    <h1>Who are you?</h1>
    <p>Choose your role to continue.</p>
    <div class="role-grid">
        <a class="role-card" href="login.html?role=HR">
            <h3>HR</h3>
            <p>Manage jobs, applications, status updates and interview schedule.</p>
        </a>
        <a class="role-card" href="login.html?role=CANDIDATE">
            <h3>Candidate</h3>
            <p>Register, apply for jobs and track status/interview updates.</p>
        </a>
        <a class="role-card" href="login.html?role=INTERVIEWER">
            <h3>Interviewer</h3>
            <p>Register and check assigned interview timings and notes.</p>
        </a>
    </div>
</div>
</body>
</html>
