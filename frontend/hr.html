<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Panel</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="index.html">Home</a>
        <a href="jobs.html">Jobs</a>
        <a href="interview.html">Schedule Interview</a>
        <a href="#" onclick="logout(); return false;">Logout</a>
    </div>
    <h1>HR - Applications</h1>
    <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; margin-bottom: 12px;">
        <input id="filterSkill" type="text" placeholder="Filter by skill">
        <select id="filterStatus">
            <option value="">All Status</option>
            <option value="Applied">Applied</option>
            <option value="Shortlisted">Shortlisted</option>
            <option value="Rejected">Rejected</option>
            <option value="Selected">Selected</option>
            <option value="Interview Scheduled">Interview Scheduled</option>
        </select>
        <button id="applyFilters" type="button">Search</button>
    </div>
    <div id="emptyState" class="empty-state" style="display:none;">No applications found.</div>
    <table>
        <thead>
        <tr>
            <th>ID</th><th>Name</th><th>Email</th><th>Skills</th><th>Experience</th><th>Status</th><th>Actions</th>
        </tr>
        </thead>
        <tbody id="applicationsTableBody"></tbody>
    </table>
</div>
<script src="js/config.js"></script>
<script src="js/common.js"></script>
<script src="js/hr.js"></script>
</body>
</html>
